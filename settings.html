<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CoinKeeper - Налаштування</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <img src="CoinKeeper1.png" alt="CoinKeeper Logo" class="logo-img">
                <span>CoinKeeper</span>
            </div>
            <nav>
                <div class="nav-item" onclick="location.href='index.html'">Головна</div>
                <div class="nav-item" onclick="location.href='expenses.html'">Мої витрати</div>
                <div class="nav-item" onclick="location.href='analytics.html'">Аналітика</div>
                <div class="nav-item" onclick="location.href='family.html'">Сім'я</div>
                <div class="nav-item" onclick="location.href='feedback.html'">Зворотний зв'язок</div>
                <div class="nav-item active" onclick="location.href='settings.html'">Налаштування</div>
            </nav>
            <div class="logout" onclick="logoutUser()">Вийти</div>
        </aside>

        <main class="main-content">
            <h1>Налаштування</h1>

            <div class="card settings-section">
                <div class="section-header">
                    <span>👤</span> <h3>Профіль</h3>
                </div>
                <div class="input-group">
                    <label>Ім'я</label>
                    <input type="text" value="Олена Петренко">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" value="olena@example.com">
                </div>
                <div class="input-group">
                    <label>Новий пароль</label>
                    <input type="password" placeholder="Введіть новий пароль">
                </div>
            </div>

            <div class="card settings-section">
                <div class="section-header">
                    <span>$</span> <h3>Бюджет</h3>
                </div>
                <div class="input-group">
                    <label>Місячний ліміт витрат (₴)</label>
                    <input type="number" value="6000">
                </div>
                <div class="input-group">
                    <label>Валюта</label>
                    <select>
                        <option>₴ Гривня (UAH)</option>
                        <option>$ Долар (USD)</option>
                        <option>€ Євро (EUR)</option>
                    </select>
                </div>
            </div>

            <div class="card settings-section">
                <div class="section-header">
                    <h3>Налаштування програми</h3>
                </div>
                <div class="toggle-group">
                    <p>Сповіщення про перевищення бюджету</p>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <button class="btn-action btn-save" onclick="alert('Зміни збережено успішно!')">
                Зберегти зміни
            </button>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
