<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CoinKeeper - Сім'я</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <img src="CoinKeeper1.png" alt="CoinKeeper Logo" class="logo-img">
                <span>CoinKeeper</span>
            </div>
            <nav>
                <div class="nav-item" onclick="location.href='index.html'">Головна</div>
                <div class="nav-item" onclick="location.href='expenses.html'">Мої витрати</div>
                <div class="nav-item" onclick="location.href='analytics.html'">Аналітика</div>
                <div class="nav-item active">Сім'я</div>
                <div class="nav-item" onclick="location.href='feedback.html'">Зворотний зв'язок</div>
                <div class="nav-item" onclick="location.href='settings.html'">Налаштування</div>
            </nav>
            <div class="logout" onclick="logoutUser()">Вийти</div>
        </aside>

        <main class="main-content">
            <h1>Сім'я</h1>

            <div class="card invite-section">
                <h3>+ Запросити члена сім'ї</h3>
                <div class="invite-input-row">
                    <input type="email" id="invite-email" placeholder="Email адреса">
                    <button class="btn-action" onclick="alert('Запрошення надіслано!')">Запросити</button>
                </div>
                <p class="hint-text">Запрошені члени матимуть доступ до перегляду витрат</p>
            </div>

            <div class="card members-section">
                <h3>Члени сім'ї (2)</h3>
                
                <div class="member-card">
                    <div class="member-info">
                        <div class="avatar teal">О</div>
                        <div>
                            <p class="member-name">Світлана Фан</p>
                            <p class="member-email">Svet1234@gmail.com</p>
                        </div>
                    </div>
                    <span class="badge owner">Власник</span>
                </div>

                <div class="member-card">
                    <div class="member-info">
                        <div class="avatar gray">І</div>
                        <div>
                            <p class="member-name">Іван Фан</p>
                            <p class="member-email">d1232ghhf@gmail.com</p>
                        </div>
                    </div>
                    <span class="badge guest">Учасник</span>
                </div>

                <div class="demo-footer">
                    Це демонстраційна версія
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
